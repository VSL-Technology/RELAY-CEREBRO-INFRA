services:
  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  relay:
    build: .
    container_name: relay-real
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    network_mode: "host"
    privileged: true
    volumes:
      - /tmp/wg-status.txt:/tmp/wg-status.txt:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    security_opt:
      - no-new-privileges:false
      - apparmor=unconfined
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.relay.rule=Host(`relay.3fconnet.cloud`)"
      - "traefik.http.routers.relay.entrypoints=websecure"
      - "traefik.http.routers.relay.tls.certresolver=le"
      - "traefik.http.services.relay.loadbalancer.server.url=http://172.17.0.1:3000"
      - "traefik.http.routers.relay.middlewares=relay-health@docker"
      - "traefik.http.middlewares.relay-health.replacepathregex.regex=^/health$"
      - "traefik.http.middlewares.relay-health.replacepathregex.replacement=/health/live"
      - "traefik.docker.network=lopesul-network"

volumes:
  redis_data:
